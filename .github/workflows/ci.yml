name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements.txt
      - name: Validate tournament data
        run: python validate_data.py
      - name: Run regression tests
        run: python -m unittest discover -s tests -v
      - name: Check dependencies and compile sources
        run: |
          python -m pip check
          python -m compileall -q app.py main.py predict_match.py fetch_data.py fetch_injuries.py fetch_schedule.py fetch_suspensions.py fetch_calibration_data.py evaluate_model.py validate_data.py src tests
      - name: Import application
        run: python -c "import app"
